<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Commander — Learn Claude Fleet</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0a0f'/%3E%3Cpolygon points='16,6 21,9.5 21,16.5 16,20 11,16.5 11,9.5' fill='none' stroke='%23d97706' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='13' r='2' fill='%23d97706'/%3E%3Ccircle cx='6' cy='6' r='2.5' fill='none' stroke='%236366f1' stroke-width='1.2'/%3E%3Ccircle cx='26' cy='6' r='2.5' fill='none' stroke='%23ef4444' stroke-width='1.2'/%3E%3Ccircle cx='6' cy='26' r='2.5' fill='none' stroke='%2322c55e' stroke-width='1.2'/%3E%3Ccircle cx='26' cy='26' r='2.5' fill='none' stroke='%233b82f6' stroke-width='1.2'/%3E%3Cline x1='11' y1='9.5' x2='8' y2='7' stroke='%236366f1' stroke-width='0.7' opacity='0.5'/%3E%3Cline x1='21' y1='9.5' x2='24' y2='7' stroke='%23ef4444' stroke-width='0.7' opacity='0.5'/%3E%3Cline x1='11' y1='16.5' x2='8' y2='24' stroke='%2322c55e' stroke-width='0.7' opacity='0.5'/%3E%3Cline x1='21' y1='16.5' x2='24' y2='24' stroke='%233b82f6' stroke-width='0.7' opacity='0.5'/%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a24; --border: #2a2a3a;
    --text: #e0e0e0; --dim: #666; --accent: #d97706; --green: #22c55e; --red: #ef4444;
    --yellow: #eab308; --blue: #3b82f6; --purple: #8b5cf6;
  }
  body {
    background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 0%, rgba(217,119,6,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(124,58,237,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(14,165,233,0.04) 0%, transparent 60%);
  }
  .game-container, .header, .footer { position: relative; z-index: 1; }
  code, .mono { font-family: 'JetBrains Mono', monospace; }

  /* ── Layout ── */
  .game-container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .header { text-align: center; padding: 40px 0 30px; }
  .header h1 { font-size: 48px; font-weight: 800; letter-spacing: -2px; }
  .header h1 span { color: var(--accent); }
  .header .tagline { color: var(--dim); font-size: 16px; margin-top: 8px; }
  .header .phase-indicator { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
  .header .phase-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
  .header .phase-dot.active { background: var(--accent); box-shadow: 0 0 8px rgba(217,119,6,0.5); }
  .header .phase-dot.done { background: var(--green); }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .card-header h2 { font-size: 16px; font-weight: 600; }
  .card-body { padding: 20px; }

  /* ── Buttons ── */
  .btn { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 14px; font-family: inherit; transition: all 0.2s; }
  .btn:hover { background: var(--border); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .btn-primary:hover { background: #b45309; }
  .btn-green { background: var(--green); border-color: var(--green); color: #000; font-weight: 600; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Inputs ── */
  input, select, textarea {
    padding: 10px 14px; border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    border-radius: 8px; font-size: 14px; font-family: inherit; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }

  /* ── Setup Phase ── */
  .setup-section { margin-bottom: 24px; }
  .setup-section label { display: block; font-size: 13px; font-weight: 600; color: var(--dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* ── Machine Builder ── */
  .machine-builder { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .machine-slot { background: var(--surface2); border: 2px dashed var(--border); border-radius: 12px; padding: 20px; min-height: 200px; display: flex; flex-direction: column; gap: 10px; transition: all 0.3s; }
  .machine-slot.filled { border-style: solid; border-color: var(--accent); }
  .machine-slot .machine-name-display { font-size: 18px; font-weight: 700; }
  .machine-slot .machine-spec { font-size: 12px; color: var(--dim); }
  .add-machine-btn { display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 32px; color: var(--dim); }
  .add-machine-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Terminal ── */
  .terminal { background: #0d0d14; border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.8; max-height: 400px; overflow-y: auto; }
  .terminal .line { opacity: 0; animation: fadeIn 0.3s ease forwards; }
  .terminal .prompt { color: var(--green); }
  .terminal .info { color: var(--blue); }
  .terminal .warn { color: var(--yellow); }
  .terminal .error { color: var(--red); }
  .terminal .success { color: var(--green); }
  .terminal .dim { color: var(--dim); }
  @keyframes fadeIn { to { opacity: 1; } }

  /* ── Inbox ── */
  .inbox-panel { display: grid; grid-template-columns: 200px 1fr; gap: 16px; }
  .inbox-list { display: flex; flex-direction: column; gap: 4px; }
  .inbox-tab { padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; transition: background 0.2s; }
  .inbox-tab:hover { background: var(--surface2); }
  .inbox-tab.active { background: var(--accent); color: #000; font-weight: 600; }
  .inbox-tab .count { font-size: 11px; background: rgba(255,255,255,0.15); padding: 1px 6px; border-radius: 10px; }
  .inbox-content { font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.8; white-space: pre-wrap; }

  /* ── Dispatch Bar ── */
  .dispatch-bar { display: flex; gap: 10px; margin-bottom: 16px; }
  .dispatch-bar select { width: 150px; }
  .dispatch-bar input { flex: 1; }

  /* ── Notification Toast ── */
  .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; min-width: 300px; animation: slideIn 0.3s ease; box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.info { border-left: 3px solid var(--blue); }
  .toast.warn { border-left: 3px solid var(--yellow); }
  .toast .toast-title { font-size: 12px; font-weight: 600; color: var(--dim); text-transform: uppercase; }
  .toast .toast-msg { font-size: 13px; margin-top: 4px; }
  @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── Phase sections ── */
  .phase { display: none; }
  .phase.active { display: block; }

  /* ── Machine status grid (play phase) ── */
  .fleet-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .fleet-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; position: relative; cursor: pointer; transition: all 0.2s; }
  .fleet-card:hover { border-color: var(--accent); }
  .fleet-card .status-dot { width: 8px; height: 8px; border-radius: 50%; position: absolute; top: 14px; right: 14px; }
  .fleet-card .status-dot.online { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.5); animation: pulse 2s infinite; }
  .fleet-card .status-dot.busy { background: var(--yellow); }
  .fleet-card .status-dot.offline { background: var(--border); }
  .fleet-card .machine-name { font-weight: 700; font-size: 15px; }
  .fleet-card .machine-info { font-size: 11px; color: var(--dim); margin-top: 4px; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 4px rgba(34,197,94,0.3); } 50% { box-shadow: 0 0 12px rgba(34,197,94,0.7); } }

  /* ── Activity Feed ── */
  .activity-feed { max-height: 300px; overflow-y: auto; }
  .activity-item { padding: 8px 12px; border-left: 3px solid var(--border); margin-bottom: 6px; font-size: 12px; border-radius: 0 6px 6px 0; background: var(--surface2); }
  .activity-item.dispatch { border-left-color: var(--accent); }
  .activity-item.complete { border-left-color: var(--green); }
  .activity-item.hook { border-left-color: var(--purple); }

  /* ── Learn badges ── */
  .learn-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; background: rgba(139,92,246,0.15); color: var(--purple); border: 1px solid rgba(139,92,246,0.3); }
  .concept-tooltip { font-size: 12px; color: var(--dim); background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-top: 8px; line-height: 1.6; }
  .concept-tooltip strong { color: var(--accent); }

  /* ── Rank Badge ── */
  .rank-bar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; }
  .rank-icon { font-size: 28px; }
  .rank-name { font-size: 16px; font-weight: 700; }
  .rank-desc { font-size: 12px; color: var(--dim); }
  .rank-progress { flex: 1; }
  .rank-progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-top: 4px; }
  .rank-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--yellow)); border-radius: 3px; transition: width 0.5s ease; }
  .rank-next { font-size: 11px; color: var(--dim); margin-top: 2px; }

  /* ── Celebration Overlay ── */
  .celebration-overlay {
    position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.5s ease;
  }
  .celebration-card {
    background: var(--surface); border: 2px solid var(--accent); border-radius: 20px;
    padding: 50px 60px; text-align: center; max-width: 600px;
    animation: celebPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .celebration-card .rank-big { font-size: 80px; margin-bottom: 16px; }
  .celebration-card h2 { font-size: 36px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
  .celebration-card .celeb-msg { font-size: 16px; color: var(--text); line-height: 1.6; margin-bottom: 24px; }
  .celebration-card .celeb-stats { display: flex; gap: 24px; justify-content: center; margin-bottom: 24px; }
  .celebration-card .celeb-stat { text-align: center; }
  .celebration-card .celeb-stat .val { font-size: 28px; font-weight: 700; }
  .celebration-card .celeb-stat .lbl { font-size: 11px; color: var(--dim); }
  @keyframes celebPop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* Confetti */
  .confetti-container { position: fixed; inset: 0; z-index: 1999; pointer-events: none; overflow: hidden; }
  .confetti {
    position: absolute; width: 10px; height: 10px; top: -20px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ── Dice Randomizer ── */
  .dice-btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--dim); cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .dice-btn:hover { color: var(--accent); border-color: var(--accent); transform: rotate(15deg); }
  .dice-btn:active { transform: rotate(360deg); transition: transform 0.3s; }

  /* ── Slideshow Animations ── */
  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideLeft { from { opacity:0; transform:translateX(-30px); } to { opacity:1; transform:translateX(0); } }
  @keyframes slideRight { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
  @keyframes scaleIn { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }
  .anim-up { animation: slideUp 0.5s ease forwards; opacity:0; }
  .anim-left { animation: slideLeft 0.5s ease forwards; opacity:0; }
  .anim-right { animation: slideRight 0.5s ease forwards; opacity:0; }
  .anim-scale { animation: scaleIn 0.4s ease forwards; opacity:0; }
  .d1 { animation-delay: 0.1s; } .d2 { animation-delay: 0.25s; } .d3 { animation-delay: 0.4s; }
  .d4 { animation-delay: 0.55s; } .d5 { animation-delay: 0.7s; } .d6 { animation-delay: 0.85s; }
  .d7 { animation-delay: 1.0s; }

  /* ── Fleet Visualization ── (Change #6: sticky, 300px) */
  .fleet-viz-container {
    position: sticky; top: 12px; z-index: 50;
    border-radius: 16px; overflow: hidden;
    border: 1px solid var(--border); margin-bottom: 20px;
    background: radial-gradient(ellipse at center, #0d0d1a 0%, #070710 100%);
  }
  .fleet-viz-canvas { display: block; width: 100%; }
  .fleet-viz-toggle {
    position: absolute; top: 10px; right: 10px; z-index: 10;
    padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: rgba(10,10,15,0.8); color: var(--dim); cursor: pointer; font-size: 11px;
    backdrop-filter: blur(4px);
  }
  .fleet-viz-toggle:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Fleet-wide mode buttons ── */
  .fleet-task-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .fleet-task-item { display: flex; align-items: center; gap: 2px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .fleet-task-item .fleet-task-label { padding: 8px 10px; font-size: 12px; white-space: nowrap; }
  .fleet-task-item .fleet-mode-btn { padding: 8px 8px; font-size: 14px; cursor: pointer; border: none; background: transparent; color: var(--text); transition: all 0.15s; border-left: 1px solid var(--border); }
  .fleet-task-item .fleet-mode-btn:hover { background: var(--accent); color: #000; }
  .fleet-task-item .fleet-mode-btn.inbox-mode:hover { background: var(--yellow); color: #000; }

  /* ── Leaderboard ── */
  .leaderboard-bar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .leaderboard-bar .lb-rank { font-size: 14px; font-weight: 700; color: var(--accent); }
  .leaderboard-bar .lb-actions { display: flex; gap: 8px; margin-left: auto; }
  .leaderboard-overlay { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; }
  .leaderboard-card { background: var(--surface); border: 2px solid var(--accent); border-radius: 16px; padding: 30px 40px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
  .leaderboard-card h2 { font-size: 24px; font-weight: 700; margin-bottom: 16px; text-align: center; }
  .lb-entry { display: flex; align-items: center; gap: 12px; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; font-size: 13px; }
  .lb-entry.you { background: rgba(217,119,6,0.15); border: 1px solid var(--accent); }
  .lb-entry .lb-pos { width: 28px; font-weight: 700; color: var(--dim); text-align: right; }
  .lb-entry .lb-name { flex: 1; font-weight: 600; }
  .lb-entry .lb-score { font-weight: 700; color: var(--accent); }
  .lb-entry .lb-rank-badge { font-size: 11px; color: var(--dim); }

  /* ── Mobile Responsive ── */
  @media (max-width: 600px) {
    .header h1 { font-size: 36px; }
    .header .tagline { font-size: 13px; }
    .game-container { padding: 12px; }
    .card-body { padding: 14px; }
    .card-header { padding: 12px 14px; flex-wrap: wrap; gap: 8px; }
    .card-header h2 { font-size: 14px; }

    /* Setup: stack form fields */
    .setup-section label { font-size: 11px; }

    /* Machine builder: single column */
    .machine-builder { grid-template-columns: 1fr; }

    /* Fleet grid: single column */
    .fleet-grid { grid-template-columns: 1fr; }

    /* Dispatch bar: stack vertically */
    .dispatch-bar { flex-direction: column; }
    .dispatch-bar select { width: 100%; }
    .dispatch-bar input { width: 100%; }

    /* Rank bar: stack */
    .rank-bar { flex-direction: column; gap: 8px; text-align: center; }
    .rank-progress { width: 100%; }

    /* Stats: wrap */
    .concept-tooltip { font-size: 11px; }
    .terminal { font-size: 11px; padding: 10px; }
    .celebration-card { padding: 30px 20px; }
    .celebration-card h2 { font-size: 28px; }
    .celebration-card .rank-big { font-size: 60px; }
    .celeb-stats { flex-wrap: wrap; gap: 16px; }

    /* Inbox panel: stack */
    .inbox-panel { grid-template-columns: 1fr; }

    /* Sticky viz smaller on mobile */
    .fleet-viz-container { top: 0; }
  }

  /* ── Footer ── */
  .footer { text-align: center; padding: 40px 0; color: var(--dim); font-size: 13px; }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="toast-container" id="toasts"></div>

<div class="game-container">
  <div class="header">
    <h1>Fleet <span>Commander</span></h1>
    <div class="tagline">Build your fleet. Dispatch tasks. Learn <a href="https://github.com/ibrews/claude-fleet" target="_blank" style="color:var(--accent);text-decoration:none;font-weight:600">claude-fleet</a> by playing.</div>
    <!-- Interactive slideshow -->
    <div id="hero-slideshow" style="max-width:800px;margin:20px auto 0;position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--border);background:#070710;aspect-ratio:1200/630;cursor:pointer" onclick="heroNext()">
      <div id="hero-slides" style="position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:30px 40px">
        <!-- Slides rendered by JS -->
      </div>
      <!-- Playback controls -->
      <div style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;z-index:5">
        <button onclick="event.stopPropagation();heroPrev()" style="background:none;border:none;color:#888;cursor:pointer;font-size:16px;padding:4px 8px;transition:color 0.2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#888'">◀</button>
        <span id="hero-dots" style="display:flex;gap:6px"></span>
        <button onclick="event.stopPropagation();heroNext()" style="background:none;border:none;color:#888;cursor:pointer;font-size:16px;padding:4px 8px;transition:color 0.2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#888'">▶</button>
        <button id="hero-pause-btn" onclick="event.stopPropagation();heroTogglePause()" style="background:none;border:none;color:#888;cursor:pointer;font-size:14px;padding:4px 8px;transition:color 0.2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#888'">⏸</button>
      </div>
      <!-- Slide counter -->
      <div style="position:absolute;bottom:12px;right:16px;font-size:11px;color:var(--dim);z-index:5" id="hero-counter"></div>
      <!-- Ambient glow -->
      <div style="position:absolute;top:-60px;left:-60px;width:300px;height:300px;background:rgba(217,119,6,0.1);border-radius:50%;filter:blur(80px);pointer-events:none"></div>
      <div style="position:absolute;bottom:-40px;right:-40px;width:250px;height:250px;background:rgba(124,58,237,0.08);border-radius:50%;filter:blur(80px);pointer-events:none"></div>
      <!-- Grid overlay -->
      <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:30px 30px;pointer-events:none"></div>
    </div>
    <div class="phase-indicator" id="phase-dots"></div>
  </div>

  <div id="game"></div>

  <!-- Change #11: Updated footer credit -->
  <div class="footer">
    Built by <a href="https://www.agilelens.com" target="_blank">Alex Coulombe</a> and Claude to streamline work at his XR studio <a href="https://www.agilelens.com" target="_blank">Agile Lens</a>.<br>

<script>
// ── Audio System (Web Audio API chiptune) ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let musicPlaying = false;
let musicInterval = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new AudioCtx();
}

function playNote(freq, duration = 0.15, type = 'square', vol = 0.06) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfxClick() { playNote(800, 0.06, 'square', 0.03); }
function sfxDispatch() { playNote(440, 0.1, 'triangle', 0.04); setTimeout(() => playNote(660, 0.1, 'triangle', 0.04), 100); }
function sfxComplete() { playNote(523, 0.1, 'sine', 0.05); setTimeout(() => playNote(659, 0.1, 'sine', 0.05), 100); setTimeout(() => playNote(784, 0.15, 'sine', 0.05), 200); }

// Trumpet fanfare for rank-ups!
function sfxRankUp() {
  const fanfare = [523, 523, 659, 784, 784, 1047];
  const timing = [0, 80, 160, 320, 400, 520];
  const durs =   [0.08, 0.08, 0.15, 0.08, 0.12, 0.4];
  fanfare.forEach((f, i) => setTimeout(() => {
    playNote(f, durs[i], 'sawtooth', 0.04);
    playNote(f, durs[i] * 0.8, 'square', 0.02);
    if (i >= 3) playNote(f * 0.75, durs[i], 'sawtooth', 0.02);
  }, timing[i]));
}

function sfxSkynet() {
  [220, 196, 165, 147, 131].forEach((f, i) => setTimeout(() => {
    playNote(f, 0.5, 'sawtooth', 0.04);
    playNote(f * 1.5, 0.5, 'square', 0.02);
    playNote(f * 0.5, 0.6, 'triangle', 0.03);
  }, i * 250));
}

// ── Generative Music System with chords + bass ──
const SCALES = {
  dreamy: [262, 294, 330, 392, 440, 523, 587, 659, 784],
  moody:  [220, 262, 294, 330, 392, 440, 523, 587, 659],
  bright: [330, 392, 440, 523, 587, 659, 784, 880, 1047],
};

const CHORD_ROOTS = {
  dreamy: [0, 3, 4, 2],
  moody:  [0, 5, 3, 4],
  bright: [0, 4, 2, 3],
};

const BASS_PATTERNS = [
  [0, 0, 4, 4],
  [0, 2, 4, 2],
  [0, 0, 0, -1],
  [0, 4, 0, 2],
];

const DURATIONS = [0.25, 0.3, 0.35, 0.4, 0.5, 0.6, 0.8];

let musicState = { scaleIdx: 0, noteIdx: 4, phraseCtr: 0, restChance: 0.12, chordIdx: 0, bassStep: 0, bassPattern: 0, beatCount: 0 };
let bassInterval = null;

function generateNote() {
  const scaleNames = Object.keys(SCALES);
  if (musicState.phraseCtr > 16 + Math.random() * 8) {
    musicState.scaleIdx = (musicState.scaleIdx + 1) % scaleNames.length;
    musicState.phraseCtr = 0;
    musicState.restChance = 0.08 + Math.random() * 0.1;
    musicState.bassPattern = Math.floor(Math.random() * BASS_PATTERNS.length);
  }
  const scaleName = scaleNames[musicState.scaleIdx];
  const scale = SCALES[scaleName];

  const step = Math.random() < 0.7 ? (Math.random() < 0.5 ? -1 : 1) : (Math.random() < 0.5 ? -2 : 2);
  musicState.noteIdx = Math.max(0, Math.min(scale.length - 1, musicState.noteIdx + step));

  const isRest = Math.random() < musicState.restChance;
  const freq = isRest ? 0 : scale[musicState.noteIdx];
  const dur = DURATIONS[Math.floor(Math.random() * DURATIONS.length)];

  musicState.restChance = isRest ? 0.05 : musicState.restChance + 0.01;
  musicState.phraseCtr++;

  return [freq, dur, scaleName];
}

function startMusic() {
  if (musicPlaying || !audioCtx) return;
  musicPlaying = true;

  function playMelody() {
    if (!musicPlaying) return;
    const [freq, dur, mood] = generateNote();
    if (freq > 0) {
      const wave = ['triangle', 'sine', 'triangle'][musicState.scaleIdx];
      playNote(freq, dur * 0.8, wave, 0.018 + Math.random() * 0.008);

      if (Math.random() < 0.25) {
        const scale = SCALES[mood];
        const idx = musicState.noteIdx;
        if (idx + 2 < scale.length) playNote(scale[idx + 2], dur * 0.7, 'sine', 0.01);
        if (idx + 4 < scale.length) playNote(scale[idx + 4], dur * 0.6, 'sine', 0.007);
      }

      if (Math.random() < 0.12) playNote(freq * 2, dur * 0.3, 'sine', 0.006);
    }
    musicInterval = setTimeout(playMelody, dur * 480 + Math.random() * 40);
  }

  function playBass() {
    if (!musicPlaying) return;
    const scaleName = Object.keys(SCALES)[musicState.scaleIdx];
    const scale = SCALES[scaleName];
    const chordRoots = CHORD_ROOTS[scaleName];
    const pattern = BASS_PATTERNS[musicState.bassPattern];

    const rootDeg = chordRoots[musicState.chordIdx % chordRoots.length];
    const bassDeg = rootDeg + pattern[musicState.bassStep % pattern.length];
    const bassIdx = Math.max(0, Math.min(scale.length - 1, bassDeg));
    const bassFreq = scale[bassIdx] * 0.5;

    playNote(bassFreq, 0.6, 'triangle', 0.02);
    playNote(bassFreq * 0.5, 0.8, 'sine', 0.012);

    musicState.bassStep++;
    if (musicState.bassStep >= 4) {
      musicState.bassStep = 0;
      musicState.chordIdx++;
    }
    musicState.beatCount++;

    bassInterval = setTimeout(playBass, 550 + Math.random() * 30);
  }

  playMelody();
  setTimeout(playBass, 300);
}

function stopMusic() {
  musicPlaying = false;
  if (musicInterval) clearTimeout(musicInterval);
  if (bassInterval) clearTimeout(bassInterval);
}

// Start audio on first user interaction
document.addEventListener('click', function initOnce() {
  initAudio();
  startMusic();
  document.removeEventListener('click', initOnce);
}, { once: true });

let heroSlide = 0;

function renderHeroSlides() {
  const el = document.getElementById('hero-slides');
  const dots = document.getElementById('hero-dots');
  if (!el) return;
  const s = HERO_SLIDES[heroSlide];
  const linkedTitle = s.title.replace('claude-fleet', '<a href="https://github.com/ibrews/claude-fleet" target="_blank" style="color:#d97706;text-decoration:none" onclick="event.stopPropagation()">claude-fleet</a>');

      ${s.visual}

  // Update counter
  const counter = document.getElementById('hero-counter');
  if (counter) counter.textContent = (heroSlide + 1) + ' / ' + HERO_SLIDES.length;
  if (dots) {
    dots.innerHTML = HERO_SLIDES.map((_, i) => `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${i === heroSlide ? '#d97706' : '#333'};transition:background 0.3s;cursor:pointer" onclick="event.stopPropagation();heroSlide=${i};renderHeroSlides();heroResetAuto()"></span>`).join('');

function heroPrev() {

function heroTogglePause() {

function heroResetAuto() {

// ── Fleet Visualization Module ──
const FleetViz = {
  canvas: null, ctx: null, enabled: true, animFrame: null,
  nodes: [],
  centerNode: null,
  wires: [],
  pulses: [],
  particles: [],
  lastTime: 0,

  init(machines) {
    if (!this.canvas) return;
    const w = this.canvas.width;
    const h = this.canvas.height;
    const cx = w / 2, cy = h / 2;
    const radius = Math.min(w, h) * 0.34;

    this.centerNode = { x: cx, y: cy, name: 'HQ', color: '#d97706', glow: 0.3, size: 22 };

    this.nodes = machines.map((m, i) => {
      const angle = (i / machines.length) * Math.PI * 2 - Math.PI / 2;
      return {
        x: cx + Math.cos(angle) * radius,
        y: cy + Math.sin(angle) * radius,
        name: m.name, color: m.color, glow: 0, processing: false, size: 16,
        targetGlow: 0, os: m.os
      };
    });

    this.wires = this.nodes.map((n, i) => {
      const dx = n.x - cx, dy = n.y - cy;
      const perpX = -dy * 0.2 * (i % 2 === 0 ? 1 : -1);
      const perpY = dx * 0.2 * (i % 2 === 0 ? 1 : -1);
      return {
        from: { x: cx, y: cy },
        to: { x: n.x, y: n.y },
        cp: { x: (cx + n.x) / 2 + perpX, y: (cy + n.y) / 2 + perpY },
        glow: 0
      };
    });

    this.pulses = [];
    this.particles = [];
    this.startLoop();
  },

  startLoop() {
    if (this.animFrame) cancelAnimationFrame(this.animFrame);
    this.lastTime = performance.now();
    const loop = (time) => {
      if (!this.enabled) { this.animFrame = null; return; }
      const dt = Math.min((time - this.lastTime) / 1000, 0.05);
      this.lastTime = time;
      this.update(dt);
      this.draw();
      this.animFrame = requestAnimationFrame(loop);
    };
    this.animFrame = requestAnimationFrame(loop);
  },

  stop() {
    if (this.animFrame) cancelAnimationFrame(this.animFrame);
    this.animFrame = null;
  },

  sendPulse(machineIdx, color) {
    if (machineIdx < 0 || machineIdx >= this.wires.length) return;
    const c = color || this.nodes[machineIdx]?.color || '#d97706';
    this.pulses.push({
      wireIdx: machineIdx, t: 0, speed: 0.6 + Math.random() * 0.3,
      color: c, size: 4 + Math.random() * 3, trail: []
    });
    this.wires[machineIdx].glow = 1;
    for (let i = 0; i < 6; i++) {
      this.particles.push({
        x: this.centerNode.x, y: this.centerNode.y,
        vx: (Math.random() - 0.5) * 60, vy: (Math.random() - 0.5) * 60,
        life: 0.6 + Math.random() * 0.4, maxLife: 1, color: c, size: 2 + Math.random() * 2
      });
    }
  },

  sendLetter(machineIdx, color) {
    if (machineIdx < 0 || machineIdx >= this.wires.length) return;
    const c = color || '#eab308';
    this.pulses.push({
      wireIdx: machineIdx, t: 0, speed: 0.25,
      color: c, size: 6, trail: [], isLetter: true
    });
    this.wires[machineIdx].glow = 0.4;
  },

  sendLettersToAll(color) {
    this.centerNode.glow = 1;
    this.nodes.forEach((_, i) => {
      setTimeout(() => this.sendLetter(i, color || '#eab308'), i * 120);
    });
    for (let i = 0; i < 10; i++) {
      const angle = Math.random() * Math.PI * 2;
      this.particles.push({
        x: this.centerNode.x, y: this.centerNode.y,
        vx: Math.cos(angle) * 30, vy: Math.sin(angle) * 30,
        life: 0.8, maxLife: 0.8, color: '#eab308', size: 2
      });
    }
  },

  mailboxMachine(machineIdx) {
    if (this.nodes[machineIdx]) {
      this.nodes[machineIdx].hasMailbox = true;
      this.nodes[machineIdx].targetGlow = 0.3;
    }
  },

  sessionStartMachine(machineIdx) {
    if (!this.nodes[machineIdx]) return;
    this.nodes[machineIdx].hasMailbox = false;
    this.nodes[machineIdx].targetGlow = 1;
    this.nodes[machineIdx].processing = true;
    const n = this.nodes[machineIdx];
    for (let i = 0; i < 15; i++) {
      const angle = (i / 15) * Math.PI * 2;
      this.particles.push({
        x: n.x, y: n.y, vx: Math.cos(angle) * 40, vy: Math.sin(angle) * 40,
        life: 0.6, maxLife: 0.6, color: '#8b5cf6', size: 2 + Math.random() * 2
      });
    }
  },

  fireworks(machineIdx) {
    if (!this.nodes[machineIdx]) return;
    const n = this.nodes[machineIdx];
    const colors = ['#ef4444', '#22c55e', '#eab308', '#3b82f6', '#d97706', '#8b5cf6', '#ec4899'];
    for (let burst = 0; burst < 3; burst++) {
      const bx = n.x + (Math.random() - 0.5) * 30;
      const by = n.y + (Math.random() - 0.5) * 30;
      const burstColor = colors[Math.floor(Math.random() * colors.length)];
      setTimeout(() => {
        for (let i = 0; i < 20; i++) {
          const angle = (i / 20) * Math.PI * 2 + Math.random() * 0.3;
          const speed = 30 + Math.random() * 70;
          this.particles.push({
            x: bx, y: by, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1 + Math.random() * 0.5, maxLife: 1.5, color: burstColor, size: 2 + Math.random() * 3
          });
        }
      }, burst * 200);
    }
  },

  activateMachine(machineIdx) {
    if (this.nodes[machineIdx]) {
      this.nodes[machineIdx].targetGlow = 1;
      this.nodes[machineIdx].processing = true;
    }
  },

  deactivateMachine(machineIdx) {
    if (this.nodes[machineIdx]) {
      this.nodes[machineIdx].targetGlow = 0;
      this.nodes[machineIdx].processing = false;
      const n = this.nodes[machineIdx];
      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        this.particles.push({
          x: n.x, y: n.y, vx: Math.cos(angle) * 50, vy: Math.sin(angle) * 50,
          life: 0.8, maxLife: 0.8, color: '#22c55e', size: 2 + Math.random() * 2
        });
      }
    }
  },

  sendToAll(color) {
    this.centerNode.glow = 1.5;
    this.nodes.forEach((_, i) => {
      setTimeout(() => this.sendPulse(i, color || '#d97706'), i * 80);
    });
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 30 + Math.random() * 80;
      this.particles.push({
        x: this.centerNode.x, y: this.centerNode.y,
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        life: 1 + Math.random() * 0.5, maxLife: 1.5, color: '#d97706', size: 3 + Math.random() * 3
      });
    }
  },

  update(dt) {
    // Update pulses
    this.pulses = this.pulses.filter(p => {
      p.t += p.speed * dt;
      const wire = this.wires[p.wireIdx];
      const pos = this.bezierPoint(wire.from, wire.cp, wire.to, Math.min(p.t, 1));
      p.trail.push({ ...pos, age: 0 });
      if (p.trail.length > 12) p.trail.shift();
      p.trail.forEach(t => t.age += dt);

      if (p.t >= 1) {
        if (p.isLetter) {
          this.mailboxMachine(p.wireIdx);
        } else {
          this.activateMachine(p.wireIdx);
        }
        return false;
      }
      return true;
    });

    this.wires.forEach(w => { w.glow = Math.max(0, w.glow - dt * 0.8); });

    this.nodes.forEach(n => {
      n.glow += (n.targetGlow - n.glow) * dt * 4;
      if (n.processing) n.glow = 0.5 + Math.sin(performance.now() * 0.004) * 0.3;
    });
    this.centerNode.glow = Math.max(0.2, this.centerNode.glow - dt * 0.5);

    this.particles = this.particles.filter(p => {
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vx *= 0.97; p.vy *= 0.97;
      p.life -= dt;
      return p.life > 0;
    });

    // Change #7: Dynamic particles based on score, cap at dt * 20
    const spawnRate = Math.min(dt * 20, dt * (2 + G.score * 0.05));
    if (Math.random() < spawnRate) {
      const w = this.canvas.width, h = this.canvas.height;
      // More varied colors at higher scores
      const baseColors = ['#ffffff'];
      if (G.score > 50) baseColors.push('#d97706', '#3b82f6');
      if (G.score > 150) baseColors.push('#22c55e', '#8b5cf6', '#ec4899');
      if (G.score > 500) baseColors.push('#ef4444', '#eab308', '#6366f1');
      const pColor = baseColors[Math.floor(Math.random() * baseColors.length)];
      this.particles.push({
        x: Math.random() * w, y: Math.random() * h,
        vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8,
        life: 2 + Math.random() * 3, maxLife: 5, color: pColor, size: 1
      });
    }
  },

  draw() {
    const ctx = this.ctx;
    const w = this.canvas.width, h = this.canvas.height;
    ctx.clearRect(0, 0, w, h);

    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 1;
    for (let x = 0; x < w; x += 30) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
    for (let y = 0; y < h; y += 30) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

    this.wires.forEach((wire, i) => {
      ctx.beginPath();
      ctx.moveTo(wire.from.x, wire.from.y);
      ctx.quadraticCurveTo(wire.cp.x, wire.cp.y, wire.to.x, wire.to.y);
      const baseAlpha = 0.08 + wire.glow * 0.4;
      ctx.strokeStyle = `rgba(255,255,255,${baseAlpha})`;
      ctx.lineWidth = 1.5 + wire.glow * 2;
      ctx.stroke();
      if (wire.glow > 0.1) {
        ctx.strokeStyle = this.nodes[i]?.color || '#d97706';
        ctx.globalAlpha = wire.glow * 0.3;
        ctx.lineWidth = 4 + wire.glow * 4;
        ctx.beginPath();
        ctx.moveTo(wire.from.x, wire.from.y);
        ctx.quadraticCurveTo(wire.cp.x, wire.cp.y, wire.to.x, wire.to.y);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    });

    this.pulses.forEach(p => {
      p.trail.forEach((t, i) => {
        const alpha = (1 - t.age) * (i / p.trail.length) * 0.6;
        ctx.beginPath();
        ctx.arc(t.x, t.y, p.size * (i / p.trail.length), 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, alpha);
        ctx.fill();
      });
      const wire = this.wires[p.wireIdx];
      const pos = this.bezierPoint(wire.from, wire.cp, wire.to, p.t);
      ctx.globalAlpha = 1;
      if (p.isLetter) {
        const s = p.size * 1.3;
        ctx.fillStyle = '#eab308';
        ctx.fillRect(pos.x - s, pos.y - s * 0.6, s * 2, s * 1.2);
        ctx.beginPath();
        ctx.moveTo(pos.x - s, pos.y - s * 0.6);
        ctx.lineTo(pos.x, pos.y + s * 0.1);
        ctx.lineTo(pos.x + s, pos.y - s * 0.6);
        ctx.fillStyle = '#ca8a04';
        ctx.fill();
        ctx.font = '6px sans-serif';
        ctx.fillStyle = '#000';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('📬', pos.x, pos.y);
      } else {
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, p.size * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }
    });

    this.particles.forEach(p => {
      const alpha = (p.life / p.maxLife) * 0.5;
      ctx.globalAlpha = Math.max(0, alpha);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    this.nodes.forEach(n => {
      if (n.glow > 0.05) {
        const grad = ctx.createRadialGradient(n.x, n.y, n.size, n.x, n.y, n.size + 20 + n.glow * 15);
        grad.addColorStop(0, n.color + Math.round(n.glow * 60).toString(16).padStart(2, '0'));
        grad.addColorStop(1, 'transparent');
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.size + 20 + n.glow * 15, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      }
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
      ctx.fillStyle = n.processing ? n.color : '#1a1a24';
      ctx.fill();
      ctx.strokeStyle = n.color;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      if (n.hasMailbox) {
        ctx.font = `${n.size * 1.1}px sans-serif`;
        ctx.globalAlpha = 0.7 + Math.sin(performance.now() * 0.003) * 0.3;
        ctx.fillStyle = '#eab308';
        ctx.fillText('📬', n.x, n.y);
        ctx.globalAlpha = 1;
      } else {
        const icon = n.os === 'macOS' ? '' : n.os === 'Windows' ? '⊞' : '🐧';
        ctx.font = `${n.size * 0.8}px sans-serif`;
        ctx.fillStyle = '#fff';
        ctx.fillText(icon, n.x, n.y);
      }
      ctx.font = '10px Inter, sans-serif';
      ctx.fillStyle = n.color;
      ctx.fillText(n.name, n.x, n.y + n.size + 14);
      if (n.hasMailbox) {
        ctx.font = '8px Inter, sans-serif';
        ctx.fillStyle = '#eab308';
        ctx.fillText('waiting for session...', n.x, n.y + n.size + 24);
      }
    });

    const cn = this.centerNode;
    const cGrad = ctx.createRadialGradient(cn.x, cn.y, cn.size, cn.x, cn.y, cn.size + 30 + cn.glow * 20);
    cGrad.addColorStop(0, '#d97706' + Math.round(cn.glow * 50).toString(16).padStart(2, '0'));
    cGrad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(cn.x, cn.y, cn.size + 30 + cn.glow * 20, 0, Math.PI * 2);
    ctx.fillStyle = cGrad;
    ctx.fill();
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
      const method = i === 0 ? 'moveTo' : 'lineTo';
      ctx[method](cn.x + Math.cos(a) * cn.size, cn.y + Math.sin(a) * cn.size);
    }
    ctx.closePath();
    ctx.fillStyle = '#1a1208';
    ctx.fill();
    ctx.strokeStyle = '#d97706';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.font = 'bold 10px Inter, sans-serif';
    ctx.fillStyle = '#d97706';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('HQ', cn.x, cn.y);
  },

  bezierPoint(p0, cp, p1, t) {
    const mt = 1 - t;
    return {
      x: mt * mt * p0.x + 2 * mt * t * cp.x + t * t * p1.x,
      y: mt * mt * p0.y + 2 * mt * t * cp.y + t * t * p1.y
    };
  }
};

// ── Change #9: Leaderboard system ──
function getLeaderboardRankName(score) {
  let rankName = RANKS[0].name;
  for (let i = RANKS.length - 1; i >= 0; i--) {
    if (score >= RANKS[i].scoreReq) { rankName = RANKS[i].name; break; }
  }
  return rankName;
}

function generateFakeLeaderboard() {
  // Seed from date so it's consistent within a day
  const dateStr = new Date().toISOString().slice(0, 10);
  let seed = 0;
  for (let i = 0; i < dateStr.length; i++) seed = ((seed << 5) - seed + dateStr.charCodeAt(i)) | 0;
  function seededRandom() { seed = (seed * 16807 + 0) % 2147483647; return (seed & 0x7fffffff) / 2147483647; }

  const fakeNames = [
    'Nebula Labs', 'Vortex AI', 'Quantum Leap', 'Dark Matter', 'Iron Forge',
    'Pixel Storm', 'Cipher Works', 'Nova Core', 'Ghost Protocol', 'Deep Signal',
    'Lunar Tide', 'Aperture R&D', 'Tyrell Systems', 'Stark HQ', 'Pied Piper',
    'Black Mesa', 'Cyberdyne', 'Weyland Corp', 'Gekko Capital', 'Acme Corp'
  ];

  const entries = [];
  const count = 15 + Math.floor(seededRandom() * 6);
  for (let i = 0; i < count; i++) {
    const score = Math.floor(seededRandom() * 6000);
    entries.push({
      name: fakeNames[i % fakeNames.length],
      score: score,
      rank: getLeaderboardRankName(score),
      isPlayer: false
    });
  }
  return entries;
}

function getLeaderboard() {
  const entries = generateFakeLeaderboard();
  // Insert the player
  entries.push({
    name: G.company.name || 'You',
    score: G.score,
    rank: RANKS[G.currentRank].name,
    isPlayer: true
  });
  // Sort descending
  entries.sort((a, b) => b.score - a.score);
  return entries;
}

function getPlayerPosition() {
  const lb = getLeaderboard();
  const idx = lb.findIndex(e => e.isPlayer);
  return { position: idx + 1, total: lb.length };
}

function saveScore() {
  try {
    localStorage.setItem('fleet-commander-score', JSON.stringify({
      name: G.company.name, score: G.score, rank: RANKS[G.currentRank].name
    }));
  } catch(e) {}
}

    if (!el._sfx) { el._sfx = true; el.addEventListener('click', sfxClick); }

  // Change #1: Don't re-init FleetViz if it's already running
  const vizCanvas = document.getElementById('fleet-viz-canvas');
  if (vizCanvas && G.phase === 5 && G.showViz) {
    if (FleetViz.animFrame) return; // Already running, don't destroy state
    const rect = vizCanvas.getBoundingClientRect();
    vizCanvas.width = rect.width * (window.devicePixelRatio || 1);
    // Change #6: 300px height
    vizCanvas.height = 300 * (window.devicePixelRatio || 1);
    vizCanvas.style.height = '300px';
    const ctx = vizCanvas.getContext('2d');
    ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    FleetViz.canvas = vizCanvas;
    FleetViz.ctx = ctx;
    FleetViz.enabled = true;
    FleetViz.init(G.machines);
  }
}

  { id: 'node', name: 'Node.js', icon: '📦', cmd: { macOS: 'brew install node', Windows: 'winget install OpenJS.NodeJS', Linux: 'curl -fsSL https://deb.nodesource.com/setup_22.x | bash && apt install -y nodejs' }, time: 1500 },
  { id: 'claude', name: 'Claude Code', icon: '🤖', cmd: { macOS: 'npm install -g @anthropic-ai/claude-code', Windows: 'npm install -g @anthropic-ai/claude-code', Linux: 'npm install -g @anthropic-ai/claude-code' }, time: 2000 },
  { id: 'hooks', name: 'Fleet Hooks', icon: '⚙️', cmd: { macOS: 'cp ~/claude-fleet/scripts/*.sh ~/claude-fleet/', Windows: 'copy claude-fleet\\scripts\\*.js claude-fleet\\', Linux: 'cp ~/claude-fleet/scripts/*.sh ~/claude-fleet/' }, time: 800 },
];

function installOn(machineIdx, stepId) {
  sfxClick();
  const m = G.machines[machineIdx];
  if (!m.installed) m.installed = {};
  if (m.installed[stepId]) return;
  m.installing = stepId;
  render();

  const step = INSTALL_STEPS.find(s => s.id === stepId);
  setTimeout(() => {
    m.installed[stepId] = true;
    m.installing = null;
    G.score += 1;
    saveScore();
    sfxComplete();
    const allDone = G.machines.every(m => INSTALL_STEPS.every(s => m.installed && m.installed[s.id]));
    if (allDone) {
      sfxRankUp();
      showToast('All Installed!', 'Every machine is ready. Time to connect the network.', 'success');
    }
    // Don't checkRank on installs — too many fire at once. Rank checked on dispatches only.
    render();
  }, step.time + Math.random() * 500);
}

function installAllOnMachine(machineIdx) {
  sfxClick();
  const m = G.machines[machineIdx];
  if (!m.installed) m.installed = {};
  let delay = 0;
  INSTALL_STEPS.forEach(step => {
    if (!m.installed[step.id]) {
      setTimeout(() => installOn(machineIdx, step.id), delay);
      delay += step.time + 300;
    }
  });
}

function installEverything() {
  sfxClick();
  G.machines.forEach((m, i) => {
    setTimeout(() => installAllOnMachine(i), i * 800);
  });
}

          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px">

              <option>Unreal Engine 5.7</option><option>Docker containers</option><option>CUDA drivers</option><option>the test suite</option>
              <option>monitoring agents</option><option>the web server</option><option>SSL certificates</option><option>backup scripts</option>
            </select>
            <span style="color:var(--dim)">on</span>
            <select id="ml-scope" style="width:auto;padding:6px 10px;font-size:12px">
              <option>all machines</option><option>GPU machines only</option><option>macOS machines</option><option>Windows machines</option><option>Linux machines</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="const v=document.getElementById('ml-verb').value,t=document.getElementById('ml-target').value,s=document.getElementById('ml-scope').value;dispatchFleetWide(v+' '+t+' on '+s, 30, 'instant')">⚡ Go!</button>
            <button class="btn btn-sm" style="background:var(--yellow);border-color:var(--yellow);color:#000" onclick="const v=document.getElementById('ml-verb').value,t=document.getElementById('ml-target').value,s=document.getElementById('ml-scope').value;dispatchFleetWide(v+' '+t+' on '+s, 30, 'inbox')">📬 Go!</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><h2>Fleet Activity</h2></div>
      <div class="card-body activity-feed" id="activity-feed">
        ${G.activity.length === 0 ? '<div style="color:var(--dim);text-align:center;padding:20px">Dispatch a task to see activity here.</div>' : ''}
        ${G.activity.map(a => `
          <div class="activity-item ${a.type}">
            <span style="color:var(--dim);font-size:11px">${a.time}</span>
            ${a.type === 'hook' ? '<span class="learn-badge" style="margin-left:6px">Hook</span>' : ''}
            <div style="margin-top:2px">${a.message}</div>

}

// ── Game Logic ──
function initKB() {
  G.machines.forEach(m => {
    G.kb.inboxes[m.name.toLowerCase()] = [];
  });
}

function initPlay() {
  G.activity = [];
  G.machines.forEach(m => m.status = 'online');
  addActivity('info', `🚀 ${G.company.name} fleet is online! ${G.machines.length} machines ready.`);
  learnConcept('fleet-setup');
}

function addScore(points, reason) {
  G.score += points;
  saveScore();
  showToast(`+${points} pts`, reason, 'info');
}

// Change #3: dispatchFleetWide now accepts mode parameter
function dispatchFleetWide(task, points, mode) {
  mode = mode || 'instant';
  sfxDispatch();
  G.usedFleetWide = true;
  learnConcept('fleet-wide-dispatch');

  if (mode === 'inbox') {
    // Inbox mode: slow letters, delayed session-start narrative for each machine
    addActivity('dispatch', `📬 <strong>Fleet-wide inbox:</strong> "${task}" → ${G.machines.length} inboxes`);
    // Change #10: fleet-wide inbox gives 1 per machine
    addScore(1 * G.machines.length, `Fleet inbox: ${task}`);
    if (FleetViz.enabled) FleetViz.sendLettersToAll('#eab308');
    learnConcept('inbox-dispatch');
    G.usedInbox = true;

    G.machines.forEach((m, i) => {
      const inboxKey = m.name.toLowerCase();
      if (!G.kb.inboxes[inboxKey]) G.kb.inboxes[inboxKey] = [];
      G.kb.inboxes[inboxKey].push({ task, from: 'you', time: new Date().toISOString() });

      // Phase 1: Letter arrives at mailbox
      setTimeout(() => {
        m.status = 'waiting';
        addActivity('info', `📬 <strong>${m.name}</strong>: Task arrived in inbox.`);
        render();

        // Phase 2: Session starts
        setTimeout(() => {
          if (FleetViz.enabled) FleetViz.sessionStartMachine(i);
          addActivity('hook', `🚀 <strong>Session started on ${m.name}!</strong> SessionStart hook fires → reads inbox`);
          G.hooksFired++;
          m.status = 'busy';
          m.currentTask = task;
          render();

          // Phase 3: Task completes
          setTimeout(() => {
            const response = getResponse(task, m);
            m.status = 'online';
            m.currentTask = null;
            G.tasksCompleted++;
            G.hooksFired++;

            const idx = G.kb.inboxes[inboxKey].findIndex(item => item.task === task);
            if (idx >= 0) G.kb.inboxes[inboxKey].splice(idx, 1);

            addActivity('complete', `✅ <strong>${m.name}</strong>: ${response.split('\n')[0].slice(0, 80)}`);
            sfxComplete();
            if (FleetViz.enabled) {
              FleetViz.fireworks(i);
              FleetViz.deactivateMachine(i);
            }
            checkRank();
            render();
          }, 2000 + Math.random() * 2000);
        }, 2500 + Math.random() * 1500);
      }, 2000 + i * 400);
    });
    render();
  } else {
    // Instant mode (original behavior)
    addActivity('dispatch', `⚡ <strong>Fleet-wide instant:</strong> "${task}" → ${G.machines.length} machines`);
    // Change #10: fleet-wide instant gives 2 per machine
    addScore(2 * G.machines.length, `Fleet instant: ${task}`);
    if (FleetViz.enabled) FleetViz.sendToAll('#d97706');
    learnConcept('instant-dispatch');
    G.usedInstant = true;

    G.machines.forEach((m, i) => {
      setTimeout(() => {
        m.status = 'busy';
        m.currentTask = task;
        render();
        setTimeout(() => {
          const response = getResponse(task, m);
          m.status = 'online';
          m.currentTask = null;
          G.tasksCompleted++;
          G.hooksFired += 2;
          addActivity('complete', `✅ <strong>${m.name}</strong>: ${response.split('\\n')[0].slice(0, 80)}`);
          sfxComplete();
          if (FleetViz.enabled) FleetViz.deactivateMachine(i);
          checkRank();
          render();
        }, 1500 + Math.random() * 2000);
      }, i * 600);
    });
    render();
  }
}

function addActivity(type, message) {
  const now = new Date();
  const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  G.activity.unshift({ type, message, time });
  if (G.activity.length > 50) G.activity.pop();
}

// Change #8: Fix promotion flash spam
function checkRank() {
  // Don't trigger a new celebration while one is already showing
  if (G.showCelebration !== null) return;
  // Don't allow rank-ups within 5 seconds of each other
  const now = Date.now();
  if (now - G.lastRankTime < 5000) return;

  // Change #10: score-based rank check
  let newRank = 0;
  for (let i = RANKS.length - 1; i >= 0; i--) {
    if (G.score >= RANKS[i].scoreReq) { newRank = i; break; }
  }
  if (newRank > G.currentRank) {
    G.lastRankTime = now;
    G.currentRank = newRank;
    G.showCelebration = newRank;
    if (newRank === RANKS.length - 1) { G.skynetTriggered = true; sfxSkynet(); stopMusic(); }
    else sfxRankUp();
    showToast('Promoted!', `You are now: ${RANKS[newRank].icon} ${RANKS[newRank].name}`, 'success');
    saveScore();
  }
}

function spawnConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#d97706', '#22c55e', '#ef4444', '#3b82f6', '#8b5cf6', '#eab308', '#ec4899', '#fff'];
  for (let i = 0; i < 150; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.width = (Math.random() * 8 + 5) + 'px';
    c.style.height = (Math.random() * 8 + 5) + 'px';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    c.style.animationDelay = (Math.random() * 1.5) + 's';
    container.appendChild(c);
  }
  setTimeout(() => container.remove(), 5000);
}

        <div class="rank-big">${rank.icon}</div>

        <div class="celeb-msg">${rank.desc}</div>
        ${isSkynet ? `
          <div style="font-size:14px;color:var(--red);margin-bottom:16px;font-family:'JetBrains Mono',monospace;line-height:1.8">
            > FLEET AUTONOMY: 100%<br>
            > HUMAN OVERSIGHT: OPTIONAL<br>

        ` : ''}
        <div class="celeb-stats">
          <div class="celeb-stat"><div class="val" style="color:var(--green)">${G.tasksCompleted}</div><div class="lbl">Tasks</div></div>
          <div class="celeb-stat"><div class="val" style="color:var(--purple)">${G.hooksFired}</div><div class="lbl">Hooks</div></div>
          <div class="celeb-stat"><div class="val" style="color:var(--accent)">${G.conceptsLearned.length}</div><div class="lbl">Concepts</div></div>
          <div class="celeb-stat"><div class="val">${G.machines.length}</div><div class="lbl">Machines</div></div>
          <div class="celeb-stat"><div class="val" style="color:var(--accent)">${G.score}</div><div class="lbl">Score</div></div>
        </div>
        ${!isSkynet ? `
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
            <button class="btn btn-primary" onclick="G.showCelebration=null;render()">Continue Commanding</button>
            <a href="https://github.com/ibrews/claude-fleet" target="_blank" class="btn" style="text-decoration:none">⭐ Take me to the repo</a>
          </div>
        ` : ''}
        ${isSkynet ? `

          <div style="margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
            <a href="https://github.com/ibrews/claude-fleet" target="_blank" class="btn btn-primary" style="text-decoration:none;font-size:14px;padding:12px 24px">⭐ Star on GitHub</a>
            <button class="btn" style="font-size:14px;padding:12px 24px" onclick="G.showCelebration=null;G.skynetTriggered=false;G.tasksCompleted=0;G.hooksFired=0;G.currentRank=0;G.score=0;G.conceptsLearned=['fleet-setup'];G.activity=[];startMusic();render()">🔄 Play Again</button>
          </div>
          <div style="font-size:12px;color:var(--dim);margin-top:12px">~20 min to set up for real. Works with any machines you have.</div>
        ` : `
          <div style="font-size:12px;color:var(--dim);margin-top:8px">${rank.next || ''}</div>
        `}
      </div>
    </div>
  `;
}

function learnConcept(id) {
  if (!G.conceptsLearned.includes(id)) {
    G.conceptsLearned.push(id);
  }
}

function showToast(title, msg, type = 'info') {
  const container = document.getElementById('toasts');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = `<div class="toast-title">${title}</div><div class="toast-msg">${msg}</div>`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

function selectMachine(name) {
  G.selectedMachine = name;
}

function dispatchInbox(target, task) {
  if (!target || !task) return;
  const machine = G.machines.find(m => m.name === target);
  const machineIdx = G.machines.indexOf(machine);
  if (FleetViz.enabled && machineIdx >= 0) FleetViz.sendLetter(machineIdx, '#eab308');
  const inbox = G.kb.inboxes[target.toLowerCase()] || [];
  inbox.push({ task, from: 'you', time: new Date().toISOString() });
  G.kb.inboxes[target.toLowerCase()] = inbox;

  addActivity('dispatch', `📬 <strong>Inbox dispatch</strong> → ${target}: "${task}"`);
  addActivity('info', `✉️ Task written to <code>inbox/${target.toLowerCase()}.md</code> and pushed via git`);
  G.hooksFired++;
  learnConcept('inbox-dispatch');
  G.usedInbox = true;

  sfxDispatch();
  // Change #10: inbox gives 1 point
  G.score += 1;
  saveScore();
  showToast('📬 Written to Inbox', `${target} will process this on next session start.`, 'info');
  render();

  setTimeout(() => {
    machine.status = 'waiting';
    addActivity('info', `📬 <strong>${target}</strong>: Task arrived in inbox. Waiting for next Claude session...`);
    render();

    setTimeout(() => {
      if (FleetViz.enabled && machineIdx >= 0) FleetViz.sessionStartMachine(machineIdx);
      addActivity('hook', `🚀 <strong>New Claude session started on ${target}!</strong> SessionStart hook fires → pulls KB → reads inbox → finds pending task`);
      G.hooksFired++;
      learnConcept('sessionstart-hook');
      showToast(`🚀 ${target}`, 'Claude session started! Processing inbox...', 'warn');
      machine.status = 'busy';
      machine.currentTask = task;
      render();

      setTimeout(() => {
        const response = getResponse(task, machine);
        machine.status = 'online';
        machine.currentTask = null;
        G.tasksCompleted++;

        const idx = G.kb.inboxes[target.toLowerCase()].findIndex(i => i.task === task);
        if (idx >= 0) G.kb.inboxes[target.toLowerCase()].splice(idx, 1);

        addActivity('complete', `✅ <strong>${target}</strong> completed: "${task}"`);
        addActivity('hook', `⚙️ <strong>Stop hook</strong> fires — KB auto-synced, Telegram notification sent`);
        G.hooksFired++;
        learnConcept('stop-hook');
        learnConcept('telegram');

        sfxComplete();
        G.score += 1;
        saveScore();
        if (FleetViz.enabled && machineIdx >= 0) {
          FleetViz.fireworks(machineIdx);
          FleetViz.deactivateMachine(machineIdx);
        }
        showToast(`🎆 ${target} (+1 pt)`, response.split('\n')[0], 'success');
        checkRank();
        render();
      }, 2000 + Math.random() * 2000);
    }, 2500 + Math.random() * 1500);
  }, 2000);

  render();
}

function dispatchInstant(target, task) {
  if (!target || !task) return;
  const machine = G.machines.find(m => m.name === target);
  const machineIdx = G.machines.indexOf(machine);
  if (FleetViz.enabled && machineIdx >= 0) FleetViz.sendPulse(machineIdx, machine.color);

  addActivity('dispatch', `⚡ <strong>Instant dispatch</strong> → ${target}: "${task}"`);
  addActivity('hook', `🔗 SSH to ${target} (${machine.os}) — running <code>claude -p "${task}" --max-turns 15</code>`);
  G.hooksFired++;
  learnConcept('instant-dispatch');
  learnConcept('headless-claude');
  G.usedInstant = true;

  sfxDispatch();
  machine.status = 'busy';
  machine.currentTask = task;
  // Change #10: instant gives 2 points
  G.score += 2;
  saveScore();
  showToast('⚡ Instant Dispatch', `SSH → ${target}. Running headless Claude...`, 'warn');
  render();

  setTimeout(() => {
    const response = getResponse(task, machine);
    machine.status = 'online';
    machine.currentTask = null;
    G.tasksCompleted++;

    addActivity('complete', `✅ <strong>${target}</strong> responded:\n<pre style="margin-top:4px;font-size:11px;color:var(--text);white-space:pre-wrap">${esc(response)}</pre>`);

    sfxComplete();
    G.score += 2;
    saveScore();
    if (FleetViz.enabled && machineIdx >= 0) FleetViz.deactivateMachine(machineIdx);
    showToast(`✅ ${target} (+2 pts)`, response.split('\n')[0], 'success');
    checkRank();
    render();
  }, 1500 + Math.random() * 2000);
}

// ── Event Binding ──
function bindEvents() {
  const nameInput = document.getElementById('company-name');
  const industrySelect = document.getElementById('company-industry');
  if (nameInput) nameInput.oninput = () => { G.company.name = nameInput.value; document.getElementById('btn-next-company').disabled = !G.company.name || !G.company.industry; };
  if (industrySelect) industrySelect.onchange = () => { G.company.industry = industrySelect.value; document.getElementById('btn-next-company').disabled = !G.company.name || !G.company.industry; };
  const nextCompanyBtn = document.getElementById('btn-next-company');
  if (nextCompanyBtn) nextCompanyBtn.onclick = () => { G.phase = 1; render(); };

  const addBtn = document.getElementById('btn-add-machine');
  if (addBtn) addBtn.onclick = () => {
    const name = document.getElementById('new-machine-name').value.trim();
    if (!name) return;
    G.machines.push({
      name,
      os: document.getElementById('new-machine-os').value,
      gpu: document.getElementById('new-machine-gpu').value,
      role: document.getElementById('new-machine-role').value,
      color: COLORS[G.machines.length % COLORS.length],
      status: 'offline'
    });
    render();
  };
  const nextMachinesBtn = document.getElementById('btn-next-machines');
  if (nextMachinesBtn) nextMachinesBtn.onclick = () => { G.phase = 2; G.machines.forEach(m => { m.installed = {}; }); render(); };

  document.querySelectorAll('.inbox-tab').forEach(tab => {
    tab.onclick = () => {
      document.querySelectorAll('.inbox-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const name = tab.dataset.inbox;
      const m = G.machines.find(m => m.name.toLowerCase() === name);
      document.getElementById('inbox-preview').textContent = `# Inbox: ${m?.name || name}\n\n## Pending\n${(G.kb.inboxes[name] || []).map(i => `- [ ] ${i.task}`).join('\n') || '(empty)'}\n\n## Done`;
    };
  });

  const dispatchInboxBtn = document.getElementById('btn-dispatch-inbox');
  const dispatchInstantBtn = document.getElementById('btn-dispatch-instant');
  const dispatchInput = document.getElementById('dispatch-task');
  if (dispatchInboxBtn) dispatchInboxBtn.onclick = () => {
    const target = document.getElementById('dispatch-target').value;
    const task = dispatchInput.value.trim();
    if (task) { dispatchInbox(target, task); dispatchInput.value = ''; }
  };
  if (dispatchInstantBtn) dispatchInstantBtn.onclick = () => {
    const target = document.getElementById('dispatch-target').value;
    const task = dispatchInput.value.trim();
    if (task) { dispatchInstant(target, task); dispatchInput.value = ''; }
  };
  if (dispatchInput) dispatchInput.onkeydown = (e) => {
    if (e.key === 'Enter') {
      const target = document.getElementById('dispatch-target').value;
      const task = dispatchInput.value.trim();
      if (task) { (e.shiftKey ? dispatchInstant : dispatchInbox)(target, task); dispatchInput.value = ''; }
    }
  };
}

function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ──
render();
</script>
